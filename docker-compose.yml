version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: aquasync_db
    environment:
      POSTGRES_USER: aquasync_user
      POSTGRES_PASSWORD: aquasync_password
      POSTGRES_DB: aquasync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquasync_user -d aquasync"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquasync_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8080"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
